services:
  - type: web
    name: workify
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SITE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
